<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="icon" type="image/png" href="./nbu_logo-Photoroom.png">
</head>
<body>
    <div class="card">
        <h1>Registratsiya</h1>
        <div id="login-card">
            <form id="myForm">
                <input type="text" id="username" minlength="4" placeholder="Login" required><br><br>
                <!-- <span id="usernameError"></span> -->
                <input type="password" id="password" minlength="8" placeholder="Password" maxlength="16" required><br><br>
                <!-- <span id="passwordError"></span> -->
                <button type="submit">Kirish</button>
            </form><br><br>
            <p id="result" style="font-size: 20px;"></p>

            <script src="./login.js"></script>
        </div>
    </div>
</body>
</html>
